services:
  robe-db:
    image: postgres:17-alpine
    container_name: robe-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: robe
      POSTGRES_USER: robe
      POSTGRES_PASSWORD: robe_dev_password
    ports:
      - "5432:5432"
    volumes:
      - robe-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robe -d robe"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  robe-postgres-data:
